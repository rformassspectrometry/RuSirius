## Adapted from rformassspectrometry/Metabonaut docker-push.yaml
## https://www.r-bloggers.com/2020/07/running-github-actions-sequentially/
name: docker

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

jobs:
  build-docker-and-push:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout Repository
        uses: actions/checkout@v4
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}
      -
        name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            rformassspectrometry/rusirius:latest
            rformassspectrometry/rusirius:${{ github.sha }}
      -
        name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
