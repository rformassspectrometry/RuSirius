## Deploy a pre-built pkgdown site to GitHub Pages.
##
## Vignettes require a Sirius login, so they cannot be rendered in CI.
## Instead, build the site locally and commit the docs/ directory:
##
##   1. Run locally:  pkgdown::build_site()
##   2. Commit and push the docs/ directory
##   3. This workflow deploys docs/ to GitHub Pages on push to main
##
## Make sure docs/ is NOT in .gitignore.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

name: Deploy pkgdown site

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
