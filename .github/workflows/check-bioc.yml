## R-CMD-check using the project's own Docker image, which includes
## Sirius, RSirius, and all Bioconductor dependencies.

on:
  push:
  pull_request:

name: R-CMD-check-bioc

env:
  cache-version: 'cache-v1'

jobs:
  build-check:
    runs-on: ubuntu-latest
    name: R-CMD-check (docker)
    container: rformassspectrometry/rusirius:latest

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      NOT_CRAN: true
      TZ: UTC
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install package dependencies
        run: |
          install.packages(c("rcmdcheck", "BiocCheck"), repos = BiocManager::repositories())
          remotes::install_local(dependencies = TRUE, repos = BiocManager::repositories(),
                                 build_vignettes = FALSE, upgrade = TRUE, force = TRUE)
        shell: Rscript {0}

      - name: Session info
        run: |
          options(width = 100)
          pkgs <- installed.packages()[, "Package"]
          sessioninfo::session_info(pkgs, include_base = TRUE)
        shell: Rscript {0}

      - name: Run CMD check
        env:
          _R_CHECK_CRAN_INCOMING_: false
        run: |
          options(crayon.enabled = TRUE)
          rcmdcheck::rcmdcheck(
              args = c("--no-manual", "--no-vignettes", "--timings"),
              build_args = c("--no-manual", "--keep-empty-dirs",
                             "--no-resave-data", "--no-build-vignettes"),
              error_on = "error",
              check_dir = "check"
          )
        shell: Rscript {0}

      - name: Run BiocCheck
        run: |
          BiocCheck::BiocCheck(
              dir('check', 'tar.gz$', full.names = TRUE),
              `quit-with-status` = TRUE,
              `no-check-R-ver` = TRUE,
              `no-check-bioc-help` = TRUE,
              `no-check-remotes` = TRUE,
              `no-check-bioc-views` = TRUE,
              `no-check-man-doc` = TRUE
          )
        shell: Rscript {0}

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: R-CMD-check-results
          path: check
